name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint
        run: bun run lint

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: matplant_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d matplant_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create test environment file
        run: |
          cat <<'EOF' > .env.test
          DATABASE_URL="postgresql://postgres:password@localhost:5432/matplant_test"
          MEILISEARCH_HOST="http://127.0.0.1:7700"
          MEILISEARCH_KEY="test-key"
          EOF

      - name: Push test schema
        run: bun run db:push:test

      - name: Run tests
        run: bun test
